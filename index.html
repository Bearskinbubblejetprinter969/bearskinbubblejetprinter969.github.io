<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    font-size:1.2rem;
    margin-bottom:25px;
    color:#ddd;
}

a{
    display:inline-block;
    padding:12px 25px;
    background:white;
    color:#2a5298;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

a:hover{
    transform:scale(1.05);
    background:#f1f1f1;
}
</style>

</head>
<body>

<div class="container">
    <h1>👋 Welcome!</h1>
    <p>This website is hosted with GitHub Pages.</p>
    <a href="https://github.com/">My GitHub</a>
</div>

</body>
</html>
